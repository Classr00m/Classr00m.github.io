<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karlee Girl Player</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #dbeafe, #fef9c3, white);
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #nowPlaying {
      margin-bottom: 20px;
      font-size: 14px;
      color: #444;
    }

    .song {
      background: rgba(255,255,255,0.7);
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      max-width: 300px;
      cursor: pointer;
      transition: 0.2s;
    }

    .song:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.9);
    }

    .locked {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .player {
      margin-top: 30px;
    }

    #error {
      margin-top: 10px;
      color: red;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <h1>Karlee Girl 🎧</h1>
  <div id="nowPlaying">Nothing playing</div>
  <div id="error"></div>

  <!-- SONG LIST -->
  <div class="song" onclick="playSong(0)">Right Back</div>
  <div class="song locked">Soon</div>
  <div class="song locked">Soon</div>
  <div class="song locked">Soon</div>

  <div class="player">
    <audio id="audio" controls></audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const nowPlaying = document.getElementById("nowPlaying");
    const errorBox = document.getElementById("error");

    const songs = [
      {
        title: "Right Back",
        url: "https://www.dropbox.com/scl/fi/qa9n3pe7zd0z6tpfzfvwf/right-back.flac.flac?rlkey=znr1abvuvd584osv0p17swxjt&st=efj98trd&raw=1",
        unlocked: true
      },
      {
        title: "Summer Glow",
        url: "",
        unlocked: false
      },
      {
        title: "Blue Skies",
        url: "",
        unlocked: false
      },
      {
        title: "Golden Hour",
        url: "",
        unlocked: false
      }
    ];

    let current = 0;

    function playSong(index) {
      const song = songs[index];

      errorBox.textContent = "";

      if (!song.unlocked) {
        errorBox.textContent = "This track is still locked 🔒";
        return;
      }

      if (!song.url) {
        errorBox.textContent = "No URL set for this track";
        return;
      }

      current = index;

      audio.src = song.url;
      audio.load();

      const playPromise = audio.play();

      if (playPromise !== undefined) {
        playPromise.catch(err => {
          errorBox.textContent = "Playback failed (format or link issue)";
          console.log(err);
        });
      }

      nowPlaying.textContent = "Now Playing: " + song.title;
    }

    audio.addEventListener("error", () => {
      errorBox.textContent = "Audio failed to load (check file format or link)";
    });

    audio.addEventListener("ended", () => {
      let next = current;

      do {
        next = (next + 1) % songs.length;
      } while (!songs[next].unlocked && next !== current);

      if (songs[next].unlocked) {
        playSong(next);
      }
    });
  </script>

</body>
</html>
