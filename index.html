<!DOCTYPE html>
<html>
<head>
  <title>Atmos Splitter</title>
</head>
<body>

<h2>Upload Dolby Atmos (.m4a)</h2>
<input type="file" id="fileInput" accept=".m4a" />
<button onclick="processFile()">Split Channels</button>

<div id="downloads"></div>

<script type="module">
import { createFFmpeg, fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js';

const ffmpeg = createFFmpeg({ log: true });

async function processFile() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) return alert("Upload a file first");

  if (!ffmpeg.isLoaded()) {
    await ffmpeg.load();
  }

  ffmpeg.FS('writeFile', 'input.m4a', await fetchFile(file));

  await ffmpeg.run(
    '-i', 'input.m4a',
    '-filter_complex', 'channelsplit=channel_layout=5.1[L][R][C][LFE][Ls][Rs]',
    '-map', '[L]', 'left.wav',
    '-map', '[R]', 'right.wav',
    '-map', '[C]', 'center.wav',
    '-map', '[LFE]', 'lfe.wav',
    '-map', '[Ls]', 'left_surround.wav',
    '-map', '[Rs]', 'right_surround.wav'
  );

  const files = [
    'left.wav',
    'right.wav',
    'center.wav',
    'lfe.wav',
    'left_surround.wav',
    'right_surround.wav'
  ];

  const downloadsDiv = document.getElementById('downloads');
  downloadsDiv.innerHTML = "<h3>Download your files:</h3>";

  files.forEach(name => {
    const data = ffmpeg.FS('readFile', name);
    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'audio/wav' }));

    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.textContent = "Download " + name;

    downloadsDiv.appendChild(a);
    downloadsDiv.appendChild(document.createElement('br'));
  });
}
</script>

</body>
</html>
