```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karlee Girl Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #dbeafe, #fef9c3, white);
      text-align: center;
      padding: 40px;
    }

    .song {
      background: rgba(255,255,255,0.7);
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      max-width: 300px;
      cursor: pointer;
      transition: 0.2s;
    }

    .song:hover {
      transform: scale(1.05);
    }

    .player {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>Karlee Girl 🎧</h1>

  <div class="song" onclick="playSong(0)">Right Back</div>
  <div class="song" onclick="playSong(1)">Summer Glow</div>
  <div class="song" onclick="playSong(2)">Blue Skies</div>
  <div class="song" onclick="playSong(3)">Golden Hour</div>

  <div class="player">
    <audio id="audio" controls></audio>
  </div>

  <script>
    const songs = [
      "songs/right-back.flac",
      "songs/summer-glow.flac",
      "songs/blue-skies.flac",
      "songs/golden-hour.flac"
    ];

    let current = 0;
    const audio = document.getElementById("audio");

    function playSong(index) {
      current = index;
      audio.src = songs[index];
      audio.play();
    }

    audio.addEventListener("ended", () => {
      current = (current + 1) % songs.length;
      playSong(current);
    });
  </script>

</body>
</html>
```
