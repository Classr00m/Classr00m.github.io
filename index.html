<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Splitter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">

<style>
body {
  margin:0;
  height:100vh;
  background: radial-gradient(circle at top, #1a0f2e, #0a0614);
  color:white;
  font-family:Segoe UI;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1 {
  margin-top:40px;
  color:#c084fc;
  text-shadow:0 0 15px rgba(192,132,252,.5);
}

.upload {
  margin-top:20px;
  width:320px;
  padding:30px;
  border-radius:16px;
  border:2px dashed #a855f7;
  text-align:center;
  cursor:pointer;
  background:rgba(255,255,255,0.03);
}

.upload:hover {
  box-shadow:0 0 20px rgba(168,85,247,0.4);
}

button {
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#a855f7,#7c3aed);
  color:white;
  cursor:pointer;
}

button:hover {
  transform:scale(1.05);
}

#status {
  margin-top:10px;
  color:#bbb;
}

#tracks {
  margin-top:25px;
  width:90%;
  max-width:1100px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:14px;
  text-align:center;
  border:1px solid rgba(168,85,247,0.2);
}

audio {
  width:100%;
  margin:10px 0;
}
</style>
</head>

<body>

<h1>💜 Audio Splitter</h1>

<div class="upload">
  <input type="file" id="fileInput" hidden>
  <label for="fileInput" style="cursor:pointer;color:#c084fc;font-weight:bold;">
    Click to Upload File
  </label>
</div>

<button id="splitBtn">Split Audio</button>

<div id="status">Idle</div>

<div id="tracks"></div>

<script type="module">
import { createFFmpeg, fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js";

const ffmpeg = createFFmpeg({ log:true });

let file = null;

/* ---------------- UPLOAD ---------------- */
const input = document.getElementById("fileInput");
const status = document.getElementById("status");

input.addEventListener("change", (e) => {
  file = e.target.files[0];
  status.textContent = file ? "Loaded: " + file.name : "No file";
});

/* ---------------- SPLIT ---------------- */
document.getElementById("splitBtn").onclick = async () => {

  if (!file) {
    alert("Upload a file first");
    return;
  }

  try {
    status.textContent = "Loading engine...";

    if (!ffmpeg.isLoaded()) {
      await ffmpeg.load();
    }

    status.textContent = "Processing...";

    ffmpeg.FS("writeFile", "input.m4a", await fetchFile(file));

    await ffmpeg.run(
      "-i","input.m4a",
      "-filter_complex","channelsplit=channel_layout=5.1[L][R][C][LFE][Ls][Rs]",
      "-map","[L]","L.wav",
      "-map","[R]","R.wav",
      "-map","[C]","C.wav",
      "-map","[LFE]","LFE.wav",
      "-map","[Ls]","LS.wav",
      "-map","[Rs]","RS.wav"
    );

    status.textContent = "Done ✔";

    const tracks = document.getElementById("tracks");
    tracks.innerHTML = "";

    const files = ["L.wav","R.wav","C.wav","LFE.wav","LS.wav","RS.wav"];

    files.forEach(name => {
      const data = ffmpeg.FS("readFile", name);
      const blob = new Blob([data.buffer], {type:"audio/wav"});
      const url = URL.createObjectURL(blob);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${name}</h3>
        <audio controls src="${url}"></audio>
        <a href="${url}" download="${name}">
          <button>Download</button>
        </a>
      `;

      tracks.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    status.textContent = "Error: " + err.message;
  }
};
</script>

</body>
</html>
